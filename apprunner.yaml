# ── AWS App Runner service configuration ──────────────────────────────────────
# Deploy via CLI:
#   aws apprunner create-service --cli-input-json file://deploy/apprunner-service.json
#
# Or use the AWS Console: App Runner → Create service → ECR → point to this config.
#
# This file documents the runtime settings. The actual service provisioning
# command (with ECR image URI and IAM role ARNs) lives in deploy/apprunner-service.json
# which is generated by deploy/push-ecr.sh.
# ──────────────────────────────────────────────────────────────────────────────

version: 1.0

runtime:
  # App Runner pulls from ECR; the image is built separately via deploy/push-ecr.sh
  source: ecr

run:
  # App Runner probes this path to decide whether the instance is healthy.
  # Must return HTTP 200. Aura Health exposes GET /health for exactly this.
  network:
    port: 8000
    env: PORT

  # ── Non-secret runtime environment variables ─────────────────────────────
  # Secrets (API keys, AWS credentials fallback) must be stored in
  # AWS Secrets Manager and referenced by ARN in the App Runner console
  # or apprunner-service.json — never hardcoded here.
  env:
    - name: AWS_DEFAULT_REGION
      value: ap-southeast-1

    - name: BEDROCK_MODEL
      value: anthropic.claude-haiku-4-5-20251001-v1:0

    # Set to the inference profile ARN if your model requires one.
    # Leave blank to use on-demand invocation.
    - name: BEDROCK_INFERENCE_PROFILE_ID
      value: ""

    - name: BEDROCK_PROVIDER
      value: anthropic

    # Knowledge-base source flags.  All disabled by default to keep cold-start
    # time short.  Enable as needed.
    - name: KB_USE_SEED
      value: "true"
    - name: KB_ENABLE_CDC
      value: "false"
    - name: KB_ENABLE_PUBMED
      value: "false"
    - name: KB_ENABLE_OPENFDA
      value: "false"
    - name: KB_ENABLE_OPENFDA_EVENT
      value: "false"
    - name: KB_ENABLE_OPENFDA_ZIP
      value: "false"

    # HuggingFace medical model (Med42 second-opinion tier).
    - name: HF_MEDICAL_MODEL
      value: m42-health/Llama3-Med42-8B

    # Persist consultation exports and audit logs to S3.
    - name: ENABLE_S3_ARTIFACT_UPLOADS
      value: "true"
    - name: AURA_OUTPUTS_BUCKET
      value: aurahealth-aura-outputs
    - name: AURA_AUDIT_BUCKET
      value: aurahealth-audit-logs
    - name: AURA_S3_PREFIX
      value: sessions

    # Output directories — local fallback paths inside the container.
    - name: OPENFDA_ZIP_DIR
      value: data/fda_zip_drop

  # ── Instance sizing ───────────────────────────────────────────────────────
  # sentence-transformers + Presidio + FAISS require at least 2 GB.
  # Recommend 4 GB for production workloads with PubMed/openFDA enabled.
  instance:
    cpu: 2
    memory: 4

  # ── Health check ─────────────────────────────────────────────────────────
  # The LLM smoke test at startup (~10–15 s) runs before /health responds.
  # Grace period must exceed total startup time (model load + smoke test).
  health_check:
    protocol: HTTP
    path: /health
    interval: 10
    timeout: 5
    healthy_threshold: 1
    unhealthy_threshold: 5
    grace_period: 120

  # ── Scaling ───────────────────────────────────────────────────────────────
  auto_scaling:
    min_size: 1
    max_size: 1
    max_concurrency: 10
